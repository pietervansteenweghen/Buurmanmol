<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital@1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --btn-red: #b31e13;
      --btn-red-dark: #6b0e08;
      --btn-yellow: #fdf9b7;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: 'Crimson Pro', Georgia, serif;
    }

    /* ── Center stage ── */
    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      z-index: 1;
    }

    /* ── Logo image ── */
    #logo {
      width: min(520px, 80vw);
      height: auto;
      display: block;
      margin-bottom: 32px;
      animation: floatIn 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Button group ── */
    #btn-group {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    /* ── The ? Button ── */
    #btn {
      position: relative;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: var(--btn-red);
      box-shadow: 0 8px 0 var(--btn-red-dark), 0 10px 18px rgba(0,0,0,0.3);
      color: var(--btn-yellow);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 96px;
      letter-spacing: -2px;
      line-height: 1;
      padding-bottom: 6px;
      user-select: none;
      transform: translateY(0);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      -webkit-tap-highlight-color: transparent;
    }

    #btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 11px 0 var(--btn-red-dark), 0 14px 22px rgba(0,0,0,0.3);
    }

    #btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 var(--btn-red-dark), 0 4px 8px rgba(0,0,0,0.2);
    }

    /* Ripple ring on click */
    #btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid rgba(253,249,183,0.7);
      opacity: 0;
      transform: scale(1);
      pointer-events: none;
    }

    #btn.ripple::after {
      animation: ring 0.5s ease-out forwards;
    }

    @keyframes ring {
      to { transform: scale(1.7); opacity: 0; }
    }

    /* ── Init (▶) button ── */
    #init-btn {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: var(--btn-red);
      box-shadow: 0 5px 0 var(--btn-red-dark), 0 7px 14px rgba(0,0,0,0.3);
      color: var(--btn-yellow);
      font-size: 30px;
      line-height: 1;
      padding-left: 4px; /* optical centering of ▶ */
      user-select: none;
      transform: translateY(0);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      -webkit-tap-highlight-color: transparent;
    }

    #init-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 0 var(--btn-red-dark), 0 10px 18px rgba(0,0,0,0.3);
    }

    #init-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 var(--btn-red-dark), 0 3px 6px rgba(0,0,0,0.2);
    }

    /* ── Now-playing label ── */
    #label {
      margin-top: 24px;
      color: rgba(179, 30, 19, 0.75);
      font-style: italic;
      font-size: 18px;
      letter-spacing: 0.04em;
      min-height: 28px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
    }

    #label.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Character reveal overlay ── */
    #char-overlay {
      position: fixed;
      inset: 0;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 32px;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    #char-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    /* Close / reshuffle buttons */
    #char-close,
    #char-reshuffle {
      position: absolute;
      top: 20px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 30px;
      color: rgba(0,0,0,0.3);
      line-height: 1;
      padding: 4px 8px;
      transition: color 0.15s;
    }

    #char-close    { right: 24px; }
    #char-reshuffle { left: 24px; font-size: 30px; }

    #char-close:hover,
    #char-reshuffle:hover { color: rgba(0,0,0,0.65); }

    @keyframes spinOnce {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    #char-reshuffle.spinning {
      animation: spinOnce 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Character card ── */
    .char-card {
      width: 220px;
      border-radius: 20px;
      padding: 28px 20px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 6px 32px rgba(0,0,0,0.10);
      opacity: 0;
      transform: translateX(-110vw);
    }

    .char-card.slide-in {
      animation: slideFromLeft 0.65s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    @keyframes slideFromLeft {
      from { opacity: 1; transform: translateX(-110vw); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .char-card img {
      width: 160px;
      height: 160px;
      object-fit: contain;
    }

.char-card .char-name {
      margin-top: 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 19px;
      letter-spacing: 0.06em;
      text-align: center;
      color: rgba(0,0,0,0.6);
      line-height: 1.25;
    }

    /* Responsive: smaller cards on narrow screens */
    @media (max-width: 720px) {
      .char-card {
        width: 150px;
        padding: 20px 14px 14px;
      }
      .char-card img {
        width: 110px;
        height: 110px;
      }
      #char-overlay { gap: 16px; }
    }
  </style>
</head>
<body>

  <div id="stage">
    <img id="logo" src="image.png" alt="Het Grote Buurman Mol Spel" />
    <div id="btn-group">
      <button id="btn">?</button>
      <button id="init-btn">&#9654;</button>
    </div>
    <div id="label"></div>
  </div>

  <!-- Character reveal overlay -->
  <div id="char-overlay">
    <button id="char-reshuffle" title="Reshuffle">&#x21BA;</button>
    <button id="char-close" title="Close">&#x2715;</button>
  </div>

  <audio id="player" preload="none"></audio>

  <script>
    // ── Audio player ──
    const TOTAL = 15;
    const tracks = Array.from({ length: TOTAL }, (_, i) =>
      `audio/${String(i + 1).padStart(2, '0')}.mpeg`
    );

    const btn    = document.getElementById('btn');
    const player = document.getElementById('player');
    const label  = document.getElementById('label');

    let lastIndex = -1;

    btn.addEventListener('click', () => {
      btn.classList.remove('ripple');
      void btn.offsetWidth;
      btn.classList.add('ripple');

      let idx;
      do { idx = Math.floor(Math.random() * TOTAL); } while (idx === lastIndex && TOTAL > 1);
      lastIndex = idx;

      player.pause();
      player.src = tracks[idx];
      player.currentTime = 0;
      player.play().catch(() => {});

      label.textContent = '♪ playing...';
      label.classList.add('show');
    });

    player.addEventListener('ended', () => {
      label.classList.remove('show');
    });

    // ── Character reveal ──
    const characters = [
      { file: 'audio/Aardworm_De_Aardworm.png',    name: 'Aardworm De Aardworm',    tint: '#fde8e0' },
      { file: 'audio/Achtergelaten_Hond.png',       name: 'Achtergelaten Hond',       tint: '#fdf5e4' },
      { file: 'audio/Berebeer_.png',                name: 'Berebeer',                 tint: '#f5e8d5' },
      { file: 'audio/Cliche_Zon_Met_Zonnebril.png', name: 'Cliche Zon Met Zonnebril', tint: '#fdfbe0' },
      { file: 'audio/Fluitende_Vogel.png',          name: 'Fluitende Vogel',          tint: '#e8e8ed' },
      { file: 'audio/Haantje_De_Voorste.png',       name: 'Haantje De Voorste',       tint: '#e0e8f5' },
      { file: 'audio/Koe.png',                      name: 'Koe',                      tint: '#ebebeb' },
      { file: 'audio/Mestkever_Martijn.png',        name: 'Mestkever Martijn',        tint: '#dce8f0' },
      { file: 'audio/Sluwe_Vos_.png',               name: 'Sluwe Vos',                tint: '#fde8d0' },
      { file: 'audio/Vogel.png',                    name: 'Vogel',                    tint: '#ede0d4' },
      { file: 'audio/Zwaardvis_Op_Het_Droge.png',   name: 'Zwaardvis Op Het Droge',   tint: '#ddf3f8' },
    ];

    const initBtn      = document.getElementById('init-btn');
    const overlay      = document.getElementById('char-overlay');
    const closeBtn     = document.getElementById('char-close');
    const reshuffleBtn = document.getElementById('char-reshuffle');

    function showCards() {
      // Pick 3 unique random characters
      const shuffled = [...characters].sort(() => Math.random() - 0.5);
      const selected = shuffled.slice(0, 3);

      // Remove old cards (keep the control buttons)
      overlay.querySelectorAll('.char-card').forEach(c => c.remove());

      // Slide cards in one by one
      selected.forEach((char, i) => {
        const card = document.createElement('div');
        card.className = 'char-card';
        card.style.background = char.tint;
        card.innerHTML = `
          <img src="${char.file}" alt="${char.name}" />
          <div class="char-name">${char.name}</div>
        `;
        overlay.appendChild(card);

        setTimeout(() => {
          card.classList.add('slide-in');
        }, i * 600);
      });
    }

    initBtn.addEventListener('click', () => {
      overlay.classList.add('active');
      showCards();
    });

    reshuffleBtn.addEventListener('click', () => {
      reshuffleBtn.classList.remove('spinning');
      void reshuffleBtn.offsetWidth; // force reflow to restart animation
      reshuffleBtn.classList.add('spinning');
      reshuffleBtn.addEventListener('animationend', () => {
        reshuffleBtn.classList.remove('spinning');
      }, { once: true });
      showCards();
    });

    closeBtn.addEventListener('click', () => {
      overlay.classList.remove('active');
    });
  </script>

</body>
</html>
